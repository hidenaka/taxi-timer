<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>タクシー乗務タイマー</title>
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="乗務タイマー">
  <meta name="theme-color" content="#1a1a1a">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: linear-gradient(180deg, #0a0a0f 0%, #15151c 100%);
      background-attachment: fixed;
      color: #f0f0f0;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 20px 40px;
    }
    header { padding: 8px 4px 20px; }
    header h1 {
      font-size: 22px;
      margin: 0 0 2px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    header p {
      font-size: 13px;
      margin: 0;
      color: #8a8a92;
      letter-spacing: 0.2px;
    }

    section {
      margin-bottom: 14px;
      padding: 20px;
      background: rgba(40, 40, 48, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .settings { padding: 8px 20px; }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }
    .setting-row + .setting-row { border-top: 1px solid rgba(255, 255, 255, 0.05); }
    .setting-row label {
      font-size: 15px;
      color: #c0c0c8;
      font-weight: 500;
    }
    .setting-row input[type="time"],
    .setting-row input[type="number"] {
      font-size: 18px;
      padding: 8px 14px;
      background: #0a0a0f;
      color: #f0f0f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .input-with-unit { display: flex; align-items: center; gap: 8px; }
    .input-with-unit input { width: 100px; text-align: right; }
    .input-with-unit span { color: #8a8a92; font-size: 15px; }

    .stopwatch {
      text-align: center;
      padding: 32px 20px 24px;
    }
    #stopwatch-display {
      font-size: 76px;
      font-variant-numeric: tabular-nums;
      font-weight: 200;
      margin: 0 0 6px;
      letter-spacing: -2px;
      background: linear-gradient(180deg, #ffffff 0%, #a8a8b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stopwatch-started {
      font-size: 13px;
      color: #8a8a92;
      font-variant-numeric: tabular-nums;
      margin: 0 0 22px;
      min-height: 18px;
      letter-spacing: 0.3px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      min-height: 50px;
      min-width: 104px;
      padding: 0 24px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      letter-spacing: 0.3px;
    }
    button:active { transform: scale(0.97); opacity: 0.85; }
    button:disabled {
      background: rgba(255, 255, 255, 0.08) !important;
      color: #555 !important;
      cursor: not-allowed;
      box-shadow: none !important;
    }
    #btn-start {
      background: linear-gradient(180deg, #4a90e2 0%, #3a7bd5 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(58, 123, 213, 0.3);
    }
    #btn-record {
      background: linear-gradient(180deg, #34c759 0%, #2ea043 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(46, 160, 67, 0.3);
    }
    #btn-discard {
      background: rgba(255, 255, 255, 0.08);
      color: #d0d0d8;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
    }
    .metric-card {
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }
    .metric-card .label {
      font-size: 11px;
      color: #8a8a92;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .metric-card .value {
      font-size: 22px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #f0f0f0;
      letter-spacing: -0.3px;
    }
    .metric-card .sub {
      font-size: 12px;
      color: #8a8a92;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .metric-card.primary {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(58, 123, 213, 0.15) 0%, rgba(46, 160, 67, 0.08) 100%);
      border-color: rgba(58, 123, 213, 0.3);
    }
    .metric-card.primary .value {
      font-size: 44px;
      font-weight: 700;
      color: #7cb8ff;
      letter-spacing: -1.2px;
      line-height: 1.1;
      margin: 2px 0 4px;
    }
    .metric-card.primary .sub {
      font-size: 14px;
      color: #c0c0c8;
    }
    .metric-card.primary.warn {
      background: linear-gradient(135deg, rgba(255, 149, 0, 0.18) 0%, rgba(255, 149, 0, 0.08) 100%);
      border-color: rgba(255, 149, 0, 0.5);
    }
    .metric-card.primary.warn .value { color: #ff9500; }
    .metric-card.primary.danger {
      background: linear-gradient(135deg, rgba(255, 59, 48, 0.2) 0%, rgba(255, 59, 48, 0.1) 100%);
      border-color: rgba(255, 59, 48, 0.6);
    }
    .metric-card.primary.danger .value { color: #ff3b30; }
    .metric-card.primary.over {
      background: linear-gradient(135deg, rgba(255, 59, 48, 0.3) 0%, rgba(139, 46, 46, 0.2) 100%);
      border-color: #ff3b30;
    }
    .metric-card.primary.over .value { color: #ff3b30; }
    .metric-card.complete {
      background: linear-gradient(135deg, rgba(58, 123, 213, 0.3) 0%, rgba(58, 123, 213, 0.12) 100%);
      border-color: rgba(58, 123, 213, 0.6);
    }
    .metric-card.complete .value { color: #7cb8ff; }
    .metric-card.complete .label { color: #7cb8ff; }

    .history h2 {
      font-size: 13px;
      margin: 0 0 12px;
      color: #8a8a92;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }
    .history-count { color: #f0f0f0; font-weight: 700; }
    .history-header {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 2px;
    }
    .history-header span {
      font-size: 10px;
      color: #8a8a92;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      flex: 1;
    }
    .history-header span:nth-child(2) { text-align: center; }
    .history-header span:nth-child(3) { text-align: right; }
    #history-list { list-style: none; padding: 0; margin: 0; }
    #history-list li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-variant-numeric: tabular-nums;
      font-size: 15px;
      display: flex;
      align-items: center;
    }
    #history-list li:last-child { border-bottom: none; }
    #history-list li span { flex: 1; }
    #history-list .rec-time { color: #f0f0f0; font-weight: 600; }
    #history-list .rec-dur { color: #8a8a92; font-size: 13px; text-align: center; }
    #history-list .rec-next { color: #7cb8ff; font-size: 14px; font-weight: 600; text-align: right; }

    .reset { padding: 14px; text-align: center; }
    #btn-reset {
      background: transparent;
      color: #8a8a92;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>タクシー乗務タイマー</h1>
      <p id="today-date">----/--/-- (-)</p>
    </header>

    <section class="settings">
      <div class="setting-row">
        <label for="shift-start-input">乗務開始</label>
        <input type="time" id="shift-start-input" value="07:00">
      </div>
      <div class="setting-row">
        <label for="target-break-input">必要休憩</label>
        <div class="input-with-unit">
          <input type="number" id="target-break-input" min="0" max="600" step="10" value="180">
          <span>分</span>
        </div>
      </div>
    </section>

    <section class="stopwatch">
      <div id="stopwatch-display">00:00:00</div>
      <div id="stopwatch-started" class="stopwatch-started"></div>
      <div class="buttons">
        <button id="btn-start" type="button">スタート</button>
        <button id="btn-record" type="button" disabled>記録</button>
        <button id="btn-discard" type="button" disabled>破棄</button>
      </div>
    </section>

    <section class="metrics">
      <div class="metric-card primary" id="deadline-card">
        <div class="label">連続走行可能時刻</div>
        <div class="value" id="deadline-time">--:--</div>
        <div class="sub" id="deadline-remaining">--</div>
      </div>
      <div class="metric-card" id="break-remaining-card">
        <div class="label">残り必要休憩</div>
        <div class="value" id="break-remaining-main">180分</div>
        <div class="sub" id="break-remaining-sub">3時間0分</div>
      </div>
      <div class="metric-card" id="break-total-card">
        <div class="label">合計休憩</div>
        <div class="value" id="break-total-main">0分</div>
        <div class="sub" id="break-total-sub">0時間0分</div>
      </div>
    </section>

    <section class="history">
      <h2>記録履歴 (<span id="history-count" class="history-count">0</span>件)</h2>
      <div class="history-header">
        <span>休憩 開始→終了</span>
        <span>時間</span>
        <span>連続走行可能時刻</span>
      </div>
      <ul id="history-list"></ul>
    </section>

    <section class="reset">
      <button id="btn-reset" type="button">全リセット</button>
    </section>
  </main>

<script>
// ============================================================
// --- Pure ---
// 依存のない純粋関数。入出力のみで動く。
// ============================================================

// 秒 → "HH:MM:SS"
function fmtStopwatch(totalSec) {
  const s = Math.max(0, Math.floor(totalSec));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

// 分 → "X分"
function fmtMinutesMain(minutes) {
  return `${Math.max(0, Math.floor(minutes))}分`;
}

// 分 → "Y時間Z分"
function fmtMinutesSub(minutes) {
  const m = Math.max(0, Math.floor(minutes));
  const h = Math.floor(m / 60);
  const rem = m % 60;
  return `${h}時間${rem}分`;
}

// ミリ秒 → "X時間Y分"（符号無視）
function fmtDuration(ms) {
  const totalMin = Math.floor(Math.abs(ms) / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}時間${m}分`;
}

// Date → "HH:MM"
function fmtTime(date) {
  return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
}

// Date → "YYYY/MM/DD (曜)"
function fmtDate(date) {
  const y = date.getFullYear();
  const mo = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  return `${y}/${mo}/${d} (${weekdays[date.getDay()]})`;
}

// "HH:MM" + 今日 → Date（今日の指定時刻）
function shiftStartToDate(hhmm, now) {
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date(now);
  d.setHours(h, m, 0, 0);
  return d;
}

// 基準時刻Date + 6時間 → 期限Date
function addSixHours(baseDate) {
  return new Date(baseDate.getTime() + 6 * 60 * 60 * 1000);
}

// ============================================================
// --- Storage ---
// localStorage のラッパー。スキーマはspec §5.1 参照。
// ============================================================

const STORAGE_KEY = 'taxi-timer-v1';

function loadState() {
  const defaults = { shiftStart: '07:00', records: [], runningStartedAt: null, targetBreakMin: 180 };
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaults;
    const parsed = JSON.parse(raw);
    return {
      shiftStart: parsed.shiftStart || '07:00',
      records: Array.isArray(parsed.records) ? parsed.records : [],
      runningStartedAt: typeof parsed.runningStartedAt === 'number' ? parsed.runningStartedAt : null,
      targetBreakMin: (typeof parsed.targetBreakMin === 'number' && parsed.targetBreakMin >= 0) ? parsed.targetBreakMin : 180
    };
  } catch (e) {
    return defaults;
  }
}

function saveState(state) {
  const data = {
    shiftStart: state.shiftStart,
    records: state.records,
    targetBreakMin: state.targetBreakMin
  };
  if (state.stopwatch.running && state.stopwatch.startedAt) {
    data.runningStartedAt = state.stopwatch.startedAt;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ============================================================
// --- State ---
// アプリ実行中の状態。永続値 + ストップウォッチ状態。
// ============================================================

const _loaded = loadState();
const state = {
  shiftStart: _loaded.shiftStart,
  records: _loaded.records,
  targetBreakMin: _loaded.targetBreakMin,
  stopwatch: _loaded.runningStartedAt
    ? { running: true, startedAt: _loaded.runningStartedAt, elapsedMs: 0 }
    : { running: false, startedAt: null, elapsedMs: 0 }
};

function currentStopwatchMs() {
  if (!state.stopwatch.running) return state.stopwatch.elapsedMs;
  return state.stopwatch.elapsedMs + (Date.now() - state.stopwatch.startedAt);
}

// ============================================================
// --- Render ---
// 状態から DOM を更新する。副作用のみ。
// ============================================================

const $ = (id) => document.getElementById(id);

function renderDate() {
  $('today-date').textContent = fmtDate(new Date());
}

function renderShiftStart() {
  $('shift-start-input').value = state.shiftStart;
}

function renderTargetBreak() {
  $('target-break-input').value = state.targetBreakMin;
}

function renderStopwatch() {
  const ms = currentStopwatchMs();
  $('stopwatch-display').textContent = fmtStopwatch(ms / 1000);
  const startedEl = $('stopwatch-started');
  if (state.stopwatch.running && state.stopwatch.startedAt) {
    startedEl.textContent = `開始 ${fmtTime(new Date(state.stopwatch.startedAt))}`;
  } else {
    startedEl.textContent = '';
  }
}

function renderButtons() {
  const ms = currentStopwatchMs();
  const running = state.stopwatch.running;
  $('btn-start').disabled = running;
  $('btn-record').disabled = !running || ms < 11 * 60 * 1000;
  $('btn-discard').disabled = !running;
}

function renderMetrics() {
  // 休憩時間メトリクス
  const totalBreakSec = state.records.reduce((s, r) => s + r.durationSec, 0);
  const totalBreakMin = Math.floor(totalBreakSec / 60);
  $('break-total-main').textContent = fmtMinutesMain(totalBreakMin);
  $('break-total-sub').textContent = fmtMinutesSub(totalBreakMin);
  const remainBreakMin = Math.max(0, state.targetBreakMin - totalBreakMin);
  $('break-remaining-main').textContent = fmtMinutesMain(remainBreakMin);
  $('break-remaining-sub').textContent = fmtMinutesSub(remainBreakMin);

  // 目標達成時は青色ハイライト
  const achieved = totalBreakMin >= state.targetBreakMin;
  $('break-total-card').classList.toggle('complete', achieved);
  $('break-remaining-card').classList.toggle('complete', achieved);

  // 基準時刻
  const now = new Date();
  let baseDate;
  if (state.records.length > 0) {
    baseDate = new Date(state.records[state.records.length - 1].recordedAt);
  } else {
    baseDate = shiftStartToDate(state.shiftStart, now);
    // 夜勤対応: 記録0件で baseDate が現在時刻より未来なら、前日の同時刻を基準にする
    if (baseDate.getTime() > now.getTime()) {
      baseDate = new Date(baseDate.getTime() - 24 * 60 * 60 * 1000);
    }
  }
  const deadline = addSixHours(baseDate);
  const remainingMs = deadline.getTime() - now.getTime();

  $('deadline-time').textContent = `${fmtTime(deadline)} まで`;
  $('deadline-remaining').textContent = remainingMs < 0
    ? `超過 ${fmtDuration(remainingMs)}`
    : `残り ${fmtDuration(remainingMs)}`;

  const card = $('deadline-card');
  card.classList.remove('warn', 'danger', 'over');
  if (remainingMs < 0) card.classList.add('over');
  else if (remainingMs <= 30 * 60 * 1000) card.classList.add('danger');
  else if (remainingMs <= 60 * 60 * 1000) card.classList.add('warn');
}

function renderHistory() {
  const list = $('history-list');
  $('history-count').textContent = state.records.length;
  list.innerHTML = '';
  const sorted = [...state.records].sort(
    (a, b) => new Date(b.recordedAt) - new Date(a.recordedAt)
  );
  for (const r of sorted) {
    const li = document.createElement('li');
    const recDate = new Date(r.recordedAt);
    const startDate = new Date(recDate.getTime() - r.durationSec * 1000);
    const mins = Math.floor(r.durationSec / 60);
    const nextDeadline = fmtTime(addSixHours(recDate));

    const timeEl = document.createElement('span');
    timeEl.className = 'rec-time';
    timeEl.textContent = `${fmtTime(startDate)} → ${fmtTime(recDate)}`;

    const durEl = document.createElement('span');
    durEl.className = 'rec-dur';
    durEl.textContent = `${mins}分`;

    const nextEl = document.createElement('span');
    nextEl.className = 'rec-next';
    nextEl.textContent = nextDeadline;

    li.appendChild(timeEl);
    li.appendChild(durEl);
    li.appendChild(nextEl);
    list.appendChild(li);
  }
}

function renderAll() {
  renderDate();
  renderShiftStart();
  renderTargetBreak();
  renderStopwatch();
  renderButtons();
  renderMetrics();
  renderHistory();
}

// ============================================================
// --- Events ---
// ============================================================

$('btn-start').addEventListener('click', () => {
  state.stopwatch.running = true;
  state.stopwatch.startedAt = Date.now();
  state.stopwatch.elapsedMs = 0;
  saveState(state);
  renderAll();
});

$('btn-discard').addEventListener('click', () => {
  state.stopwatch.running = false;
  state.stopwatch.startedAt = null;
  state.stopwatch.elapsedMs = 0;
  saveState(state);
  renderAll();
});

$('btn-record').addEventListener('click', () => {
  const ms = currentStopwatchMs();
  if (ms < 11 * 60 * 1000) return; // 二重防御
  const record = {
    recordedAt: new Date().toISOString(),
    durationSec: Math.floor(ms / 1000)
  };
  state.records.push(record);
  state.stopwatch.running = false;
  state.stopwatch.startedAt = null;
  state.stopwatch.elapsedMs = 0;
  saveState(state);
  renderAll();
});

$('shift-start-input').addEventListener('change', (e) => {
  state.shiftStart = e.target.value || '07:00';
  saveState(state);
  renderAll();
});

$('target-break-input').addEventListener('change', (e) => {
  const val = parseInt(e.target.value, 10);
  state.targetBreakMin = Number.isFinite(val) && val >= 0 ? val : 180;
  saveState(state);
  renderAll();
});

$('btn-reset').addEventListener('click', () => {
  if (!confirm('記録履歴を全て削除します。よろしいですか？')) return;
  state.records = [];
  state.stopwatch.running = false;
  state.stopwatch.startedAt = null;
  state.stopwatch.elapsedMs = 0;
  saveState(state);
  renderAll();
});

// ============================================================
// --- Tick ---
// 1秒ごとに時計・メトリクス・ボタン状態を再描画する。
// ============================================================

setInterval(() => {
  renderStopwatch();
  renderMetrics();
  renderButtons();
}, 1000);

// ============================================================
// --- Init ---
// ============================================================

renderAll();
</script>
</body>
</html>
